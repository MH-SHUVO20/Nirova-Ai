# ─────────────────────────────────────────────────────────────
# NirovaAI — CD Pipeline (Build, Push to Docker Hub, Deploy)
# Builds the combined frontend+backend image and pushes to
# Docker Hub as: mhshuvo20/nirova-backend:latest
# ─────────────────────────────────────────────────────────────
#
# Required GitHub Secrets:
#   DOCKERHUB_TOKEN      — Docker Hub access token
#   VITE_API_URL         — (Optional) Production API URL
#   DEPLOY_WEBHOOK_URL   — (Optional) Webhook to trigger deployment
# ─────────────────────────────────────────────────────────────
name: NirovaAI Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: mhshuvo20
  IMAGE_NAME: mhshuvo20/nirova-backend

jobs:

  # ── Build & Push Combined Image ─────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || 'https://api.nirovaai.app' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  # ── Deploy ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment:
      name: production
      url: https://nirovaai.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Webhook deploy (Render, Railway, etc.) ────────────
      - name: Trigger deployment webhook
        if: secrets.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "ref": "${{ github.sha }}",
              "image": "${{ env.IMAGE_NAME }}:latest",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'
        continue-on-error: true

      # ── Deployment Summary ────────────────────────────────
      - name: Deployment summary
        run: |
          echo "## 🚀 NirovaAI Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ needs.build-and-push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY
