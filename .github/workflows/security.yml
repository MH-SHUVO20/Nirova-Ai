# ─────────────────────────────────────────────────────────────
# NirovaAI — Security Scan Pipeline
# Runs weekly + on every push to main
# ─────────────────────────────────────────────────────────────
name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6 AM UTC
  workflow_dispatch:

jobs:

  # ── Dependency vulnerability scan ───────────────────────────
  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --output pip-audit-report.txt || true
          cat pip-audit-report.txt
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit npm dependencies
        run: |
          cd frontend
          npm audit --production || true
        continue-on-error: true

  # ── Docker image vulnerability scan ─────────────────────────
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: nirovaai/backend:scan

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nirovaai/backend:scan
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # ── Secret scanning ────────────────────────────────────────
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
