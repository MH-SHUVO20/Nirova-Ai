
# NirovaAI Full Stack
# Run: docker-compose up
# Frontend: http://localhost:5173
# Backend:  http://localhost:8000
# API Docs: http://localhost:8000/docs (only when DEBUG=true)

services:

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nirovaai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Use authenticated MongoDB connection within the Docker network
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nirovaai}:${MONGO_INITDB_ROOT_PASSWORD:-change_me_in_env}@mongo:27017/nirovaai?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_in_env}@redis:6379
    volumes:
      - ./backend/app:/app/app
      - ./backend/app/models:/app/models
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # MongoDB — bound to localhost only, authentication enabled
  mongo:
    image: mongo:7
    container_name: nirovaai_mongo
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-nirovaai}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change_me_in_env}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # Redis Cache — bound to localhost only, password protected
  redis:
    image: redis:7-alpine
    container_name: nirovaai_redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_env}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_env}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

volumes:
  mongo_data:
