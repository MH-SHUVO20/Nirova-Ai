
# ─────────────────────────────────────────────────────────────
# NirovaAI — Docker Compose (Dev + Production)
# ─────────────────────────────────────────────────────────────
# Usage:
#   Dev:   docker compose up --build
#   Prod:  docker compose --profile prod up --build -d
#
# Frontend: http://localhost:5173 (dev) / http://localhost (prod)
# Backend:  http://localhost:8000
# API Docs: http://localhost:8000/docs (only when DEBUG=true)
# ─────────────────────────────────────────────────────────────

services:

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nirovaai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DB/cache URIs to use Docker internal network
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nirovaai}:${MONGO_INITDB_ROOT_PASSWORD:-change_me_in_env}@mongo:27017/nirovaai?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_in_env}@redis:6379
    volumes:
      - ./backend/app:/app/app
      - ./backend/app/models:/app/models
    networks:
      - nirovaai_net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── React Frontend (Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: nirovaai_frontend
    ports:
      - "80:80"
    networks:
      - nirovaai_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: nirovaai_mongo
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-nirovaai}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change_me_in_env}
    volumes:
      - mongo_data:/data/db
    networks:
      - nirovaai_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nirovaai_redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_env} --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - nirovaai_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_env}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  nirovaai_net:
    driver: bridge

volumes:
  mongo_data:
